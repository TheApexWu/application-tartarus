# Profile definitions for application-tartarus
# Each profile defines how to tailor the resume for a category of roles.
#
# Skills are now dynamically selected from skills_inventory in resume_data.yaml.
# `skill_buckets` defines the label + which categories to pull from + max items.
# The actual skills are scored against the JD and top ones are picked.
#
# To customize: copy this file to profiles/custom.yaml and edit.

ml:
  keywords:
    - machine learning
    - ml engineer
    - deep learning
    - pytorch
    - tensorflow
    - model training
    - neural network
    - nlp
    - computer vision
    - llm
    - ai
  coursework: "Machine Learning, Deep Learning, Causal Inference, Predictive Analytics, Data Structures & Algorithms"
  skill_buckets:
    - label: Languages
      categories: [lang]
      max: 4
    - label: ML & AI
      categories: [ml]
      max: 5
    - label: Tools & Infra
      categories: [data, web, infra]
      max: 5
  project_order:
    - PsychohistoryML
    - Audio Depression
    - Music Transcription
    - Majikari
    - Touhou
  experience_emphasis:
    - nlp
    - ml
    - pipeline
    - model
    - classification
    - prediction
    - data

